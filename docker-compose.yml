version: '3.8'

x-common-volumes: &common-volumes
  # Map the host directories into the container so that models, caches, and results persist securely!
  - ./data:/app/data
  - ./results:/app/results
  - ./v4_engine/bin:/app/v4_engine/bin
  - ./v4_engine/models:/app/v4_engine/models

services:
  # Base service to define the build context
  base:
    build:
      context: .
      dockerfile: Dockerfile
    image: latent-diffusion-hmm:latest
    profiles:
      - donotrun # Keeps this from running directly with `docker-compose up`

  # -----------------------------------------------------
  # THE LABORATORY (v3)
  # -----------------------------------------------------
  ensemble:
    image: latent-diffusion-hmm:latest
    volumes: *common-volumes
    command: python orchestrators/ensemble_pipeline.py
    profiles:
      - ensemble

  grid-search:
    image: latent-diffusion-hmm:latest
    volumes: *common-volumes
    command: python orchestrators/grid_search.py
    profiles:
      - grid-search

  # -----------------------------------------------------
  # THE BATTLEFIELD (v4)
  # -----------------------------------------------------
  compile:
    image: latent-diffusion-hmm:latest
    volumes: *common-volumes
    # Chaining the compilation sequence securely
    command: >
      bash -c "
      python v4_engine/train_vae.py &&
      python v4_engine/train_router.py &&
      python v4_engine/train_experts.py &&
      python v4_engine/train_meta.py &&
      python v4_engine/compile_engine.py
      "
    profiles:
      - compile

  live:
    image: latent-diffusion-hmm:latest
    volumes: *common-volumes
    command: python v4_engine/live_bridge_ctrader.py
    profiles:
      - live
